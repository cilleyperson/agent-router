# Agent Router Configuration

server:
  host: "127.0.0.1"
  port: 8000
  log_level: "info"

# Model Tier definitions
# Tier 1 (Low-Cost, High-Efficiency) -> used for simple tasks, reads, code explanations
# Tier 2 (High-Quality, Advanced Reasoning) -> used for code changes, debugging, complex logic
tiers:
  tier1:
    provider: "openai"       # can be openai, anthropic, gemini, deepseek
    model: "gpt-4o-mini"
    api_key_env: "OPENAI_API_KEY"
  tier2:
    provider: "anthropic"
    model: "claude-3-5-sonnet-20241022"
    api_key_env: "ANTHROPIC_API_KEY"

# Fallback models in case of rate limits or service down
fallbacks:
  openai:
    tier1: "gpt-4o-mini"
    tier2: "gpt-4o"
  anthropic:
    tier1: "claude-3-5-haiku-20241022"
    tier2: "claude-3-5-sonnet-20241022"
  gemini:
    tier1: "gemini-1.5-flash"
    tier2: "gemini-1.5-pro"
  deepseek:
    tier1: "deepseek-chat"
    tier2: "deepseek-chat"

# Caching configurations
caching:
  enabled: true
  database_path: "agent_router.db"
  # Threshold for semantic cache match (0.0 to 1.0)
  semantic_threshold: 0.82
  # Provider and model to generate embeddings for semantic caching
  # Set to "local" to use the fast, offline TF-IDF semantic router
  embedding_provider: "local" 
  embedding_model: "none"
  # Enable downstream provider prompt caching annotations (e.g. Anthropic)
  prompt_caching_enabled: true

# Routing rules
routing:
  default_tier: 1
  # Cheap-first validation cascade: run Tier 1 first and validate before Tier 2
  cascade_enabled: true
  # Code context compaction: strip whitespace and comments before forwarding prompts
  compress_context: true
  # Max character length of prompt before bypassing complex checks and using Tier 1 for reads
  max_read_context_threshold: 30000
  # Strict token budget limit for context window (prunes oldest chat items if exceeded)
  context_token_budget: 8192
  # Keywords indicating a Tier 2 task
  tier2_keywords:
    - "fix"
    - "debug"
    - "refactor"
    - "implement"
    - "modify"
    - "rewrite"
    - "create"
    - "write"
    - "test"
    - "fail"
    - "error"
    - "issue"
    - "exception"
    - "add support"
    - "integrate"
  # Keywords indicating a Tier 1 task (takes precedence over Tier 2 keywords if matched)
  tier1_keywords:
    - "explain"
    - "what is"
    - "how does"
    - "summarize"
    - "list"
    - "read"
    - "show"
    - "find"
    - "search"
    - "where is"
    - "get"
    - "tell me about"

# Local model routing options (Optional overrides)
local_routing:
  enabled: false
  provider: "ollama"                  # Can be "ollama" or "openai_compatible" (e.g., LM Studio, vLLM)
  base_url: "http://localhost:11434"  # Default local endpoint
  max_complexity_threshold: 3.0       # Bypass local routing if complexity score is >= 3.0
  tier1:
    model: "qwen2.5-coder:7b"         # Recommended local Tier 1 model
  tier2:
    enabled: false                    # Set true to route Tier 2 requests locally
    model: "qwen2.5-coder:32b"        # Recommended local Tier 2 model (requires heavy VRAM)
